<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard - Muzz Shop | Akun Saya</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ================================================================================== */
        /* MUZZ SHOP - DASHBOARD PAGE - FULL STYLESHEET                                     */
        /* VERSION 3.0.0 - ULTIMATE EDITION                                                */
        /* ================================================================================== */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0a1a 0%, #1a1a3a 50%, #0d0d2b 100%);
            min-height: 100vh;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-animation div {
            position: absolute;
            display: block;
            background: linear-gradient(145deg, rgba(0, 210, 255, 0.06), rgba(168, 85, 247, 0.06));
            border-radius: 50%;
            animation: floatSlow 25s infinite ease-in-out;
        }

        @keyframes floatSlow {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-30px) translateX(20px); }
            50% { transform: translateY(20px) translateX(-20px); }
            75% { transform: translateY(-10px) translateX(10px); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bg-animation div:nth-child(1) { top: 10%; left: 10%; width: 120px; height: 120px; animation-duration: 20s; }
        .bg-animation div:nth-child(2) { top: 70%; left: 80%; width: 180px; height: 180px; animation-duration: 25s; animation-delay: 2s; }
        .bg-animation div:nth-child(3) { top: 40%; left: 85%; width: 80px; height: 80px; animation-duration: 18s; animation-delay: 4s; }
        .bg-animation div:nth-child(4) { top: 80%; left: 20%; width: 150px; height: 150px; animation-duration: 22s; animation-delay: 1s; }
        .bg-animation div:nth-child(5) { top: 20%; left: 60%; width: 100px; height: 100px; animation-duration: 28s; animation-delay: 3s; }
        .bg-animation div:nth-child(6) { top: 50%; left: 35%; width: 220px; height: 220px; animation-duration: 30s; animation-delay: 5s; }
        .bg-animation div:nth-child(7) { top: 15%; left: 45%; width: 60px; height: 60px; animation-duration: 15s; animation-delay: 6s; }
        .bg-animation div:nth-child(8) { top: 85%; left: 55%; width: 110px; height: 110px; animation-duration: 26s; animation-delay: 7s; }

        /* Navbar */
        .navbar {
            background: rgba(10, 20, 35, 0.98);
            backdrop-filter: blur(25px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 210, 255, 0.25);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(145deg, #00d2ff, #a855f7, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            background: none;
            color: #00d2ff;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: #cbd5e1;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            background: linear-gradient(145deg, #00d2ff15, #a855f715);
            color: white;
        }

        .btn-logout {
            background: linear-gradient(145deg, #f43f5e, #e11d48);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(244, 63, 94, 0.4);
        }

        /* Main Container */
        .main-container {
            max-width: 1280px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* Welcome Card */
        .welcome-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 32px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.5s ease;
        }

        .welcome-card h2 {
            color: #1e293b;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .welcome-card p {
            color: #64748b;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 28px;
            padding: 1.8rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.5s ease 0.1s backwards;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.15);
        }

        .stat-icon {
            width: 65px;
            height: 65px;
            background: linear-gradient(145deg, #00d2ff, #3a7bd5);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.8rem;
            color: white;
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: 900;
            color: #00d2ff;
        }

        .stat-label {
            color: #64748b;
            margin-top: 0.5rem;
            font-weight: 600;
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: linear-gradient(145deg, #00d2ff, #3a7bd5);
            color: white;
            transform: translateY(-2px);
        }

        /* Section Title */
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.2rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(0, 210, 255, 0.3);
        }

        /* Orders List */
        .orders-list {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .order-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-left: 4px solid #00d2ff;
            transition: all 0.3s ease;
        }

        .order-item:hover {
            transform: translateX(8px);
            background: #f1f5f9;
        }

        /* Empty State */
        .empty-orders {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        .empty-orders i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
            color: #cbd5e1;
        }

        .empty-orders a {
            color: #00d2ff;
            text-decoration: none;
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
                padding: 1rem;
            }
            .nav-links {
                justify-content: center;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .main-container {
                padding: 100px 16px 30px;
            }
            .welcome-card h2 {
                font-size: 1.4rem;
            }
            .quick-actions {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .quick-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
    </div>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-bolt"></i> Muzz Shop</div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link active">📊 Dashboard</a>
            <a href="products.html" class="nav-link">🛍️ Products</a>
            <a href="contact.html" class="nav-link">📞 Contact</a>
            <a href="profile.html" class="nav-link">👤 Profile</a>
            <button class="btn-logout" onclick="logout()">🚪 Logout</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="welcome-card">
            <h2 id="welcomeName">Welcome back! 👋</h2>
            <p>Selamat datang di Muzz Shop! Sistem auto order dengan QRIS & TNG Malaysia.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-shopping-cart"></i></div>
                <div class="stat-number" id="orderCount">0</div>
                <div class="stat-label">Total Pesanan</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-bolt"></i></div>
                <div class="stat-number">Auto</div>
                <div class="stat-label">Order System</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-qrcode"></i></div>
                <div class="stat-number">QRIS</div>
                <div class="stat-label">TNG</div>
            </div>
        </div>

        <div class="quick-actions">
            <button class="action-btn" onclick="location.href='products.html'">
                <i class="fas fa-shopping-bag"></i> Belanja Sekarang
            </button>
            <button class="action-btn" onclick="location.href='orders.html'">
                <i class="fas fa-history"></i> Riwayat Pesanan
            </button>
            <button class="action-btn" onclick="location.href='profile.html'">
                <i class="fas fa-user-edit"></i> Edit Profil
            </button>
            <button class="action-btn" onclick="contactCS()">
                <i class="fab fa-whatsapp"></i> Hubungi CS
            </button>
        </div>

        <div class="section-title">
            <i class="fas fa-history"></i>
            <span>Riwayat Pesanan Terbaru</span>
        </div>
        <div id="ordersList" class="orders-list"></div>
    </div>

    <script>
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) {
                window.location.href = 'login.html';
                return null;
            }
            return user;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('pendingOrder');
            window.location.href = 'index.html';
        }

        function contactCS() {
            window.open('https://wa.me/60175632450?text=Halo%20CS%2C%20saya%20butuh%20bantuan', '_blank');
        }

        function loadDashboard() {
            const user = checkAuth();
            if (!user) return;

            document.getElementById('welcomeName').innerHTML = `Halo, ${user.name}! 👋`;

            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const userOrders = orders.filter(o => o.customerEmail === user.email);
            
            document.getElementById('orderCount').innerHTML = userOrders.length;

            const container = document.getElementById('ordersList');
            
            if (userOrders.length === 0) {
                container.innerHTML = `
                    <div class="empty-orders">
                        <i class="fas fa-inbox"></i>
                        <p>Belum ada pesanan</p>
                        <a href="products.html">🛍️ Mulai belanja sekarang</a>
                    </div>
                `;
                return;
            }

            // Tampilkan 5 pesanan terakhir
            const latestOrders = userOrders.slice(-5).reverse();
            
            container.innerHTML = latestOrders.map(order => `
                <div class="order-item" onclick="location.href='orders.html'">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap;">
                        <div>
                            <strong>${order.productName}</strong>
                            <br>
                            <small style="color: #64748b;">🆔 ${order.orderId}</small>
                            <br>
                            <small style="color: #64748b;">📅 ${order.date}</small>
                            <br>
                            <small style="color: #64748b;">💰 Rp ${order.price.toLocaleString()}</small>
                        </div>
                        <span style="background: ${order.status === 'paid' ? '#22c55e' : '#eab308'}; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; height: fit-content;">
                            ${order.status === 'paid' ? '✅ Lunas' : '⏳ Menunggu'}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        loadDashboard();
    </script>
</body>
</html>
