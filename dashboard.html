<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Muzz Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d2ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: #a0b3d9;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 40px;
            transition: all 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
        }

        .btn-logout {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .main-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .welcome-card {
            background: white;
            border-radius: 28px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .welcome-card h2 {
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .welcome-card p {
            color: #4a4a6a;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.6rem;
            color: white;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #00d2ff;
        }

        .stat-label {
            color: #4a4a6a;
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .orders-list {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .order-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #00d2ff;
        }

        .empty-orders {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-bolt"></i> Muzz Shop</div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
            <a href="products.html" class="nav-link">Products</a>
            <a href="contact.html" class="nav-link">Contact</a>
            <a href="profile.html" class="nav-link">Profile</a>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="welcome-card">
            <h2 id="welcomeName">Welcome back!</h2>
            <p>Welcome to Muzz Shop - Auto Order System with QRIS & DuitNow Payment</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-shopping-cart"></i></div>
                <div class="stat-number" id="orderCount">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-bolt"></i></div>
                <div class="stat-number">Ready</div>
                <div class="stat-label">Auto Order</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-qrcode"></i></div>
                <div class="stat-number">QRIS</div>
                <div class="stat-label">DuitNow</div>
            </div>
        </div>

        <div class="section-title">
            <i class="fas fa-history"></i>
            <span>Order History</span>
        </div>
        <div id="ordersList" class="orders-list"></div>
    </div>

    <script>
        function checkAuth() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'login.html';
            }
            return currentUser;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        function loadDashboard() {
            const user = checkAuth();
            if (!user) return;

            document.getElementById('welcomeName').innerHTML = 'Hello, ' + user.name + '!';

            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const userOrders = orders.filter(o => o.customerEmail === user.email);

            document.getElementById('orderCount').innerHTML = userOrders.length;

            const ordersList = document.getElementById('ordersList');
            if (userOrders.length === 0) {
                ordersList.innerHTML = '<div class="empty-orders"><i class="fas fa-inbox"></i><br><br>No orders yet<br><br><a href="products.html" style="color:#00d2ff;">Start shopping now</a></div>';
            } else {
                ordersList.innerHTML = userOrders.reverse().map(order => `
                    <div class="order-item">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                            <div>
                                <strong>${order.productName}</strong><br>
                                <small>ID: ${order.orderId}</small><br>
                                <small>${order.date}</small>
                            </div>
                            <span style="background: ${order.status === 'paid' ? '#22c55e' : '#eab308'}; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem;">
                                ${order.status === 'paid' ? 'Paid' : 'Pending'}
                            </span>
                        </div>
                    </div>
                `).join('');
            }
        }

        loadDashboard();
    </script>
</body>
</html>
