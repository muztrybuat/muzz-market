<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzz Shop - Auto Order System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bg-animation div {
            position: absolute;
            display: block;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            25% { transform: translateY(-100px) translateX(50px); opacity: 0.6; }
            50% { transform: translateY(50px) translateX(-50px); opacity: 0.4; }
            75% { transform: translateY(-50px) translateX(100px); opacity: 0.5; }
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d2ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            background: none;
            color: #00d2ff;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: #4a5568;
            font-weight: 500;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: #00d2ff;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 20px 50px;
            position: relative;
            z-index: 1;
        }

        .hero-card {
            max-width: 650px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 3rem 2.5rem;
            animation: slideUp 0.8s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-logo {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .hero-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 1rem;
        }

        .hero-desc {
            color: #718096;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
            padding: 12px 32px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #00d2ff;
            padding: 10px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 2px solid #00d2ff;
        }

        .btn-secondary:hover {
            background: rgba(0, 210, 255, 0.1);
            transform: translateY(-3px);
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }

        .feature {
            text-align: center;
        }

        .feature-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #00d2ff20, #a855f720);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 1.5rem;
            color: #00d2ff;
        }

        .feature-text {
            font-size: 0.85rem;
            color: #4a5568;
            font-weight: 500;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .hero-card {
                padding: 2rem 1.5rem;
            }
            .hero-title {
                font-size: 1.6rem;
            }
            .hero-logo {
                font-size: 2rem;
            }
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div style="top: 10%; left: 10%; width: 100px; height: 100px; animation-delay: 0s;"></div>
        <div style="top: 70%; left: 80%; width: 150px; height: 150px; animation-delay: 2s;"></div>
        <div style="top: 40%; left: 85%; width: 60px; height: 60px; animation-delay: 4s;"></div>
        <div style="top: 80%; left: 20%; width: 80px; height: 80px; animation-delay: 1s;"></div>
        <div style="top: 20%; left: 60%; width: 50px; height: 50px; animation-delay: 3s;"></div>
    </div>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-bolt"></i> Muzz Shop</div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="login.html" class="nav-link">Login</a>
            <a href="register.html" class="nav-link">Register</a>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-card">
            <div class="hero-logo">
                <i class="fas fa-shopping-cart"></i> Muzz Shop
            </div>
            <h1 class="hero-title">Auto Order System</h1>
            <p class="hero-desc">Solusi terbaik untuk pembelian produk digital dengan pembayaran QRIS Indonesia & TNG Malaysia. Cepat, Aman, dan Terpercaya.</p>
            
            <div class="btn-group">
                <a href="login.html" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
                <a href="register.html" class="btn-secondary">
                    <i class="fas fa-user-plus"></i> Register
                </a>
            </div>
            
            <div class="features">
                <div class="feature">
                    <div class="feature-icon"><i class="fas fa-qrcode"></i></div>
                    <div class="feature-text">QRIS Indonesia</div>
                </div>
                <div class="feature">
                    <div class="feature-icon"><i class="fas fa-mobile-alt"></i></div>
                    <div class="feature-text">TNG Malaysia</div>
                </div>
                <div class="feature">
                    <div class="feature-icon"><i class="fab fa-whatsapp"></i></div>
                    <div class="feature-text">Auto WhatsApp</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2024 Muzz Shop. All rights reserved.</p>
    </div>
</body>
</html>
