<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - Muzz Shop | Masuk ke Akun</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ================================================================================== */
        /* MUZZ SHOP - LOGIN PAGE - FULL STYLESHEET                                         */
        /* VERSION 3.0.0 - ULTIMATE EDITION                                                */
        /* ================================================================================== */
        
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #0a0a1a 0%, #1a1a3a 50%, #0d0d2b 100%);
            min-height: 100vh;
            line-height: 1.5;
            color: #e2e8f0;
            overflow-x: hidden;
            position: relative;
        }

        /* ----------------------------------------------
           CUSTOM SCROLLBAR PREMIUM
        ---------------------------------------------- */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(145deg, #00d2ff, #a855f7, #7c3aed);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(145deg, #00b4d8, #9b30ff, #6d28d9);
        }

        ::-webkit-scrollbar-corner {
            background: #1a1a2e;
        }

        /* ----------------------------------------------
           SELECTION STYLE
        ---------------------------------------------- */
        ::selection {
            background: linear-gradient(145deg, #00d2ff, #a855f7);
            color: white;
        }

        ::-moz-selection {
            background: linear-gradient(145deg, #00d2ff, #a855f7);
            color: white;
        }

        /* ----------------------------------------------
           ANIMATIONS KEYFRAMES
        ---------------------------------------------- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatSlow {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
            }
            25% {
                transform: translateY(-30px) translateX(20px);
            }
            50% {
                transform: translateY(20px) translateX(-20px);
            }
            75% {
                transform: translateY(-10px) translateX(10px);
            }
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ----------------------------------------------
           ANIMATED BACKGROUND PARTICLES
        ---------------------------------------------- */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-animation div {
            position: absolute;
            display: block;
            background: linear-gradient(145deg, rgba(0, 210, 255, 0.08), rgba(168, 85, 247, 0.08));
            border-radius: 50%;
            animation: floatSlow 25s infinite ease-in-out;
        }

        .bg-animation div:nth-child(1) { top: 10%; left: 10%; width: 120px; height: 120px; animation-duration: 20s; }
        .bg-animation div:nth-child(2) { top: 70%; left: 80%; width: 180px; height: 180px; animation-duration: 25s; animation-delay: 2s; }
        .bg-animation div:nth-child(3) { top: 40%; left: 85%; width: 80px; height: 80px; animation-duration: 18s; animation-delay: 4s; }
        .bg-animation div:nth-child(4) { top: 80%; left: 20%; width: 150px; height: 150px; animation-duration: 22s; animation-delay: 1s; }
        .bg-animation div:nth-child(5) { top: 20%; left: 60%; width: 100px; height: 100px; animation-duration: 28s; animation-delay: 3s; }
        .bg-animation div:nth-child(6) { top: 50%; left: 35%; width: 220px; height: 220px; animation-duration: 30s; animation-delay: 5s; }
        .bg-animation div:nth-child(7) { top: 15%; left: 45%; width: 60px; height: 60px; animation-duration: 15s; animation-delay: 6s; }
        .bg-animation div:nth-child(8) { top: 85%; left: 55%; width: 110px; height: 110px; animation-duration: 26s; animation-delay: 7s; }

        /* ----------------------------------------------
           NAVBAR PREMIUM
        ---------------------------------------------- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 20, 35, 0.98);
            backdrop-filter: blur(25px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(0, 210, 255, 0.25);
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 900;
            background: linear-gradient(145deg, #00d2ff, #a855f7, #7c3aed, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo i {
            background: none;
            color: #00d2ff;
            margin-right: 5px;
        }

        .logo:hover {
            transform: scale(1.02);
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.3));
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: #cbd5e1;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            font-size: 0.95rem;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(145deg, #00d2ff, #a855f7);
            transition: width 0.3s ease;
        }

        .nav-link:hover::before {
            width: 70%;
        }

        .nav-link:hover {
            background: linear-gradient(145deg, #00d2ff15, #a855f715);
            color: white;
        }

        /* ----------------------------------------------
           LOGIN CONTAINER
        ---------------------------------------------- */
        .login-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 48px;
            padding: 2.8rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
            border: 1px solid rgba(0, 210, 255, 0.2);
            transition: all 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 210, 255, 0.5);
        }

        .logo-center {
            text-align: center;
            margin-bottom: 1rem;
        }

        .logo-center .logo-text {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(145deg, #00d2ff, #a855f7, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        /* ----------------------------------------------
           FORM STYLES
        ---------------------------------------------- */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: #1e293b;
            font-size: 0.85rem;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #00d2ff;
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafc;
            color: #1e293b;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d2ff;
            box-shadow: 0 0 0 4px rgba(0, 210, 255, 0.15);
        }

        /* ----------------------------------------------
           FORGOT PASSWORD
        ---------------------------------------------- */
        .forgot-link {
            text-align: right;
            margin-bottom: 1.5rem;
        }

        .forgot-link a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .forgot-link a:hover {
            color: #00d2ff;
        }

        /* ----------------------------------------------
           BUTTON
        ---------------------------------------------- */
        .btn {
            width: 100%;
            background: linear-gradient(145deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.4);
        }

        /* ----------------------------------------------
           AUTH LINK
        ---------------------------------------------- */
        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
            font-size: 0.9rem;
        }

        .auth-link a {
            color: #00d2ff;
            text-decoration: none;
            font-weight: 700;
        }

        /* ----------------------------------------------
           DIVIDER
        ---------------------------------------------- */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        /* ----------------------------------------------
           SOCIAL BUTTONS
        ---------------------------------------------- */
        .social-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-btn {
            flex: 1;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #64748b;
            font-weight: 500;
        }

        .social-btn:hover {
            background: #f1f5f9;
            transform: translateY(-2px);
        }

        /* ----------------------------------------------
           MESSAGES
        ---------------------------------------------- */
        .error-msg {
            background: linear-gradient(145deg, #fee2e2, #fecaca);
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            display: none;
            border: 1px solid #fecaca;
        }

        /* ----------------------------------------------
           MODAL FORGOT PASSWORD
        ---------------------------------------------- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            animation: modalSlideIn 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e2e8f0;
        }

        .modal-header h3 {
            color: #1e293b;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.3s;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .close-modal:hover {
            color: #ef4444;
            background: #fee2e2;
            transform: rotate(90deg);
        }

        /* ----------------------------------------------
           RESPONSIVE
        ---------------------------------------------- */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
                padding: 1rem;
            }
            .nav-links {
                justify-content: center;
            }
            .login-card {
                padding: 1.8rem;
                margin: 0 1rem;
            }
            h2 {
                font-size: 1.5rem;
            }
            .social-buttons {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem;
            }
            .logo-center .logo-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
    </div>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-bolt"></i> Muzz Shop</div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="login.html" class="nav-link active">🔐 Login</a>
            <a href="register.html" class="nav-link">📝 Register</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-center">
                <div class="logo-text"><i class="fas fa-bolt"></i> Muzz Shop</div>
            </div>
            <h2>Welcome Back! 👋</h2>
            <p class="subtitle">Login to your account</p>

            <div id="errorMsg" class="error-msg"></div>

            <div class="form-group">
                <label>📧 Email Address</label>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
            </div>

            <div class="form-group">
                <label>🔒 Password</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="password">
                </div>
            </div>

            <div class="forgot-link">
                <a href="#" onclick="openForgotModal()">Forgot Password?</a>
            </div>

            <button class="btn" onclick="login()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>

            <div class="divider">or</div>

            <div class="social-buttons">
                <button class="social-btn" onclick="alert('Google login coming soon')">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="social-btn" onclick="alert('Facebook login coming soon')">
                    <i class="fab fa-facebook"></i> Facebook
                </button>
            </div>

            <div class="auth-link">
                Don't have account? <a href="register.html">📝 Register here</a>
            </div>
            <div class="auth-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Modal Forgot Password -->
    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-key"></i> Forgot Password</h3>
                <button class="close-modal" onclick="closeForgotModal()">&times;</button>
            </div>
            <div id="step1">
                <p style="color:#64748b;margin-bottom:1.5rem;">Masukkan email Anda untuk verifikasi.</p>
                <div class="form-group">
                    <label>📧 Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="resetEmail" placeholder="your@email.com">
                    </div>
                </div>
                <button class="btn" onclick="verifyEmail()">Verifikasi Email</button>
            </div>
            <div id="step2" style="display:none;">
                <p style="color:#64748b;margin-bottom:1rem;">Masukkan password baru Anda.</p>
                <div class="form-group">
                    <label>🔒 New Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPassword" placeholder="New password">
                    </div>
                </div>
                <div class="form-group">
                    <label>✅ Confirm New Password</label>
                    <div class="input-group">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="confirmNewPassword" placeholder="Confirm new password">
                    </div>
                </div>
                <button class="btn" onclick="resetPassword()">Reset Password</button>
                <div class="auth-link" style="margin-top:1rem;">
                    <a href="#" onclick="backToStep1()">← Kembali</a>
                </div>
            </div>
            <div id="forgotErrorMsg" class="error-msg" style="margin-top:1rem;"></div>
        </div>
    </div>

    <script>
        let resetEmailTemp = '';
        
        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('errorMsg');
            
            errorDiv.style.display = 'none';
            
            if (!email || !password) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Email dan password wajib diisi!';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Email atau password salah!';
            }
        }
        
        function openForgotModal() {
            const modal = document.getElementById('forgotModal');
            if (modal) {
                document.getElementById('step1').style.display = 'block';
                document.getElementById('step2').style.display = 'none';
                document.getElementById('resetEmail').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmNewPassword').value = '';
                document.getElementById('forgotErrorMsg').style.display = 'none';
                modal.classList.add('active');
            }
        }
        
        function closeForgotModal() {
            const modal = document.getElementById('forgotModal');
            if (modal) modal.classList.remove('active');
        }
        
        function verifyEmail() {
            const email = document.getElementById('resetEmail').value;
            const errorDiv = document.getElementById('forgotErrorMsg');
            
            errorDiv.style.display = 'none';
            
            if (!email) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Masukkan email Anda!';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email);
            
            if (!user) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Email tidak ditemukan! Silakan register terlebih dahulu.';
                return;
            }
            
            resetEmailTemp = email;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }
        
        function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;
            const errorDiv = document.getElementById('forgotErrorMsg');
            
            errorDiv.style.display = 'none';
            
            if (!newPassword || !confirmPassword) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Isi kedua field password!';
                return;
            }
            
            if (newPassword.length < 4) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Password minimal 4 karakter!';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Password tidak cocok!';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.email === resetEmailTemp);
            
            if (userIndex !== -1) {
                users[userIndex].password = newPassword;
                localStorage.setItem('users', JSON.stringify(users));
                
                alert('✅ Password berhasil diubah! Silakan login dengan password baru Anda.');
                closeForgotModal();
                document.getElementById('loginPassword').value = '';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ User tidak ditemukan!';
            }
        }
        
        function backToStep1() {
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('resetEmail').value = '';
            document.getElementById('forgotErrorMsg').style.display = 'none';
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('forgotModal');
            if (event.target === modal) {
                closeForgotModal();
            }
        }
    </script>
</body>
</html>
