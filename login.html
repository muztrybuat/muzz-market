<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Muzz Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
        body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .login-container{width:100%;max-width:450px;}
        .login-card{background:rgba(255,255,255,0.98);border-radius:32px;padding:2.5rem;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);animation:fadeIn 0.6s ease;}
        @keyframes fadeIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}
        .logo{text-align:center;font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#00d2ff,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:0.5rem;}
        h2{text-align:center;color:#1a1a2e;margin-bottom:0.5rem;}
        .subtitle{text-align:center;color:#4a4a6a;margin-bottom:2rem;}
        .form-group{margin-bottom:1.5rem;}
        .form-group label{display:block;margin-bottom:0.5rem;font-weight:600;color:#1a1a2e;}
        .input-group{position:relative;}
        .input-group i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#00d2ff;}
        .input-group input{width:100%;padding:14px 16px 14px 48px;border:1px solid #ddd;border-radius:16px;font-size:1rem;transition:0.3s;background:#f8fafc;}
        .input-group input:focus{outline:none;border-color:#00d2ff;box-shadow:0 0 0 3px rgba(0,210,255,0.2);}
        .btn{width:100%;background:linear-gradient(135deg,#00d2ff,#3a7bd5);color:white;border:none;padding:14px;border-radius:40px;font-size:1rem;font-weight:700;cursor:pointer;transition:0.3s;margin-top:0.5rem;}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(0,210,255,0.3);}
        .auth-link{text-align:center;margin-top:1.5rem;color:#4a4a6a;}
        .auth-link a{color:#00d2ff;text-decoration:none;font-weight:600;}
        .error-msg{background:#fee2e2;color:#dc2626;padding:12px;border-radius:12px;margin-bottom:1.5rem;text-align:center;display:none;}
        .success-msg{background:#dcfce7;color:#16a34a;padding:12px;border-radius:12px;margin-bottom:1.5rem;text-align:center;display:none;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;justify-content:center;align-items:center;}
        .modal.active{display:flex;}
        .modal-content{background:white;border-radius:32px;padding:2rem;max-width:450px;width:90%;}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid #e2e8f0;}
        .modal-header h3{color:#1a1a2e;font-size:1.3rem;}
        .close-modal{background:none;border:none;font-size:1.8rem;cursor:pointer;color:#a0aec0;}
        .close-modal:hover{color:#dc2626;}
        .forgot-step{display:block;}
        .forgot-step.hidden{display:none;}
        @media (max-width:600px){.login-card{padding:1.8rem;}}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo"><i class="fas fa-bolt"></i> Muzz Shop</div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to your account</p>
            <div id="errorMsg" class="error-msg"></div>
            <div class="form-group"><label>Email Address</label><div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="your@email.com"></div></div>
            <div class="form-group"><label>Password</label><div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="password"></div></div>
            <button class="btn" onclick="login()">Login</button>
            <div class="auth-link"><a href="#" onclick="openForgotModal()">Forgot Password?</a></div>
            <div class="auth-link">Don't have account? <a href="register.html">Register</a></div>
            <div class="auth-link"><a href="index.html">← Back to Home</a></div>
        </div>
    </div>

    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3><i class="fas fa-key"></i> Forgot Password</h3><button class="close-modal" onclick="closeForgotModal()">&times;</button></div>
            <div id="step1" class="forgot-step">
                <p style="color:#4a4a6a;margin-bottom:1.5rem;">Masukkan email Anda untuk verifikasi.</p>
                <div class="form-group"><label>Email Address</label><div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="resetEmail" placeholder="your@email.com"></div></div>
                <button class="btn" onclick="verifyEmail()">Verifikasi Email</button>
            </div>
            <div id="step2" class="forgot-step" style="display:none;">
                <p style="color:#4a4a6a;margin-bottom:1rem;">Masukkan password baru Anda.</p>
                <div class="form-group"><label>New Password</label><div class="input-group"><i class="fas fa-lock"></i><input type="password" id="newPassword" placeholder="New password"></div></div>
                <div class="form-group"><label>Confirm New Password</label><div class="input-group"><i class="fas fa-check-circle"></i><input type="password" id="confirmNewPassword" placeholder="Confirm new password"></div></div>
                <button class="btn" onclick="resetPassword()">Reset Password</button>
                <div class="auth-link" style="margin-top:1rem;"><a href="#" onclick="backToStep1()">← Kembali</a></div>
            </div>
            <div id="forgotErrorMsg" class="error-msg" style="margin-top:1rem;"></div>
            <div id="forgotSuccessMsg" class="success-msg" style="margin-top:1rem;"></div>
        </div>
    </div>

    <script>
        let resetEmailTemp = '';
        function login(){const email=document.getElementById('loginEmail').value;const password=document.getElementById('loginPassword').value;const errorDiv=document.getElementById('errorMsg');errorDiv.style.display='none';if(!email||!password){errorDiv.style.display='block';errorDiv.innerHTML='❌ Email dan password wajib diisi!';return;}
        const users=JSON.parse(localStorage.getItem('users')||'[]');const user=users.find(u=>u.email===email&&u.password===password);
        if(user){localStorage.setItem('currentUser',JSON.stringify(user));window.location.href='dashboard.html';}else{errorDiv.style.display='block';errorDiv.innerHTML='❌ Email atau password salah!';}}
        
        function openForgotModal(){const modal=document.getElementById('forgotModal');if(modal){document.getElementById('step1').style.display='block';document.getElementById('step2').style.display='none';document.getElementById('resetEmail').value='';document.getElementById('newPassword').value='';document.getElementById('confirmNewPassword').value='';document.getElementById('forgotErrorMsg').style.display='none';document.getElementById('forgotSuccessMsg').style.display='none';modal.classList.add('active');}}
        function closeForgotModal(){const modal=document.getElementById('forgotModal');if(modal)modal.classList.remove('active');}
        function verifyEmail(){const email=document.getElementById('resetEmail').value;const errorDiv=document.getElementById('forgotErrorMsg');const successDiv=document.getElementById('forgotSuccessMsg');errorDiv.style.display='none';successDiv.style.display='none';if(!email){errorDiv.style.display='block';errorDiv.innerHTML='❌ Masukkan email Anda!';return;}
        const users=JSON.parse(localStorage.getItem('users')||'[]');const user=users.find(u=>u.email===email);if(!user){errorDiv.style.display='block';errorDiv.innerHTML='❌ Email tidak ditemukan! Silakan register terlebih dahulu.';return;}
        resetEmailTemp=email;document.getElementById('step1').style.display='none';document.getElementById('step2').style.display='block';successDiv.style.display='block';successDiv.innerHTML='✅ Email terverifikasi! Masukkan password baru Anda.';setTimeout(()=>{successDiv.style.display='none';},2000);}
        function resetPassword(){const newPassword=document.getElementById('newPassword').value;const confirmPassword=document.getElementById('confirmNewPassword').value;const errorDiv=document.getElementById('forgotErrorMsg');const successDiv=document.getElementById('forgotSuccessMsg');errorDiv.style.display='none';successDiv.style.display='none';if(!newPassword||!confirmPassword){errorDiv.style.display='block';errorDiv.innerHTML='❌ Isi kedua field password!';return;}
        if(newPassword.length<4){errorDiv.style.display='block';errorDiv.innerHTML='❌ Password minimal 4 karakter!';return;}
        if(newPassword!==confirmPassword){errorDiv.style.display='block';errorDiv.innerHTML='❌ Password tidak cocok!';return;}
        const users=JSON.parse(localStorage.getItem('users')||'[]');const userIndex=users.findIndex(u=>u.email===resetEmailTemp);if(userIndex!==-1){users[userIndex].password=newPassword;localStorage.setItem('users',JSON.stringify(users));successDiv.style.display='block';successDiv.innerHTML='✅ Password berhasil diubah! Silakan login dengan password baru Anda.';setTimeout(()=>{closeForgotModal();document.getElementById('loginPassword').value='';},2000);}else{errorDiv.style.display='block';errorDiv.innerHTML='❌ User tidak ditemukan!';}}
        function backToStep1(){document.getElementById('step1').style.display='block';document.getElementById('step2').style.display='none';document.getElementById('resetEmail').value='';document.getElementById('forgotErrorMsg').style.display='none';document.getElementById('forgotSuccessMsg').style.display='none';}
        window.onclick=function(event){const modal=document.getElementById('forgotModal');if(event.target===modal){closeForgotModal();}}
    </script>
</body>
</html>
