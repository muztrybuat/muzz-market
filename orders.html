<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Muzz Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d2ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: #a0b3d9;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 40px;
            transition: all 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
        }

        .btn-logout {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .main-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .orders-list {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .order-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-left: 4px solid #00d2ff;
            transition: 0.3s;
        }

        .order-item:hover {
            background: #edf2f7;
            transform: translateX(5px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
        }

        .order-product {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .order-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-paid {
            background: #22c55e;
            color: white;
        }

        .status-pending {
            background: #eab308;
            color: white;
        }

        .order-details {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .order-detail-item {
            font-size: 0.8rem;
            color: #4a4a6a;
        }

        .order-detail-item i {
            width: 20px;
            color: #00d2ff;
        }

        .empty-orders {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        .empty-orders i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .empty-orders a {
            color: #00d2ff;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .order-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .order-details {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-bolt"></i> Muzz Shop</div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="products.html" class="nav-link">Products</a>
            <a href="contact.html" class="nav-link">Contact</a>
            <a href="profile.html" class="nav-link">Profile</a>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="section-title">
            <i class="fas fa-history"></i>
            <span>Riwayat Pesanan</span>
        </div>
        <div id="ordersHistoryList" class="orders-list"></div>
    </div>

    <script>
        function checkAuth() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'login.html';
            }
            return currentUser;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        function loadOrdersHistory() {
            const user = checkAuth();
            if (!user) return;
            
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const userOrders = orders.filter(o => o.customerEmail === user.email);
            
            const container = document.getElementById('ordersHistoryList');
            
            if (userOrders.length === 0) {
                container.innerHTML = `
                    <div class="empty-orders">
                        <i class="fas fa-inbox"></i>
                        <p>Belum ada pesanan</p>
                        <a href="products.html">Mulai Belanja Sekarang →</a>
                    </div>
                `;
            } else {
                container.innerHTML = userOrders.reverse().map(order => `
                    <div class="order-item">
                        <div class="order-header">
                            <span class="order-product">${order.productName}</span>
                            <span class="order-status ${order.status === 'paid' ? 'status-paid' : 'status-pending'}">
                                ${order.status === 'paid' ? '✅ Lunas' : '⏳ Menunggu Pembayaran'}
                            </span>
                        </div>
                        <div class="order-details">
                            <div class="order-detail-item"><i class="fas fa-hashtag"></i> ID: ${order.orderId}</div>
                            <div class="order-detail-item"><i class="far fa-calendar-alt"></i> ${order.date}</div>
                            <div class="order-detail-item"><i class="fas fa-money-bill-wave"></i> Rp ${order.price.toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        loadOrdersHistory();
    </script>
</body>
</html>
