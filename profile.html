<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Profile - Muzz Shop | Akun Saya</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ================================================================================== */
        /* MUZZ SHOP - PROFILE PAGE - FULL STYLESHEET                                      */
        /* VERSION 3.0.0 - ULTIMATE EDITION                                                */
        /* ================================================================================== */
        
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #0a0a1a 0%, #1a1a3a 50%, #0d0d2b 100%);
            min-height: 100vh;
            line-height: 1.5;
            color: #e2e8f0;
            overflow-x: hidden;
            position: relative;
        }

        /* ----------------------------------------------
           CUSTOM SCROLLBAR PREMIUM
        ---------------------------------------------- */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(145deg, #00d2ff, #a855f7, #7c3aed);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(145deg, #00b4d8, #9b30ff, #6d28d9);
        }

        ::-webkit-scrollbar-corner {
            background: #1a1a2e;
        }

        /* ----------------------------------------------
           SELECTION STYLE
        ---------------------------------------------- */
        ::selection {
            background: linear-gradient(145deg, #00d2ff, #a855f7);
            color: white;
        }

        ::-moz-selection {
            background: linear-gradient(145deg, #00d2ff, #a855f7);
            color: white;
        }

        /* ----------------------------------------------
           ANIMATIONS KEYFRAMES
        ---------------------------------------------- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.7;
                transform: scale(0.98);
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(0, 210, 255, 0.3), 0 0 10px rgba(168, 85, 247, 0.2);
            }
            50% {
                box-shadow: 0 0 20px rgba(0, 210, 255, 0.5), 0 0 30px rgba(168, 85, 247, 0.3);
            }
        }

        @keyframes floatSlow {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
            }
            25% {
                transform: translateY(-30px) translateX(20px);
            }
            50% {
                transform: translateY(20px) translateX(-20px);
            }
            75% {
                transform: translateY(-10px) translateX(10px);
            }
        }

        @keyframes borderGlow {
            0%, 100% {
                border-color: rgba(0, 210, 255, 0.3);
            }
            50% {
                border-color: rgba(0, 210, 255, 0.8);
            }
        }

        /* ----------------------------------------------
           ANIMATED BACKGROUND PARTICLES
        ---------------------------------------------- */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-animation div {
            position: absolute;
            display: block;
            background: linear-gradient(145deg, rgba(0, 210, 255, 0.08), rgba(168, 85, 247, 0.08));
            border-radius: 50%;
            animation: floatSlow 25s infinite ease-in-out;
        }

        .bg-animation div:nth-child(1) { top: 10%; left: 10%; width: 120px; height: 120px; animation-duration: 20s; animation-delay: 0s; }
        .bg-animation div:nth-child(2) { top: 70%; left: 80%; width: 180px; height: 180px; animation-duration: 25s; animation-delay: 2s; }
        .bg-animation div:nth-child(3) { top: 40%; left: 85%; width: 80px; height: 80px; animation-duration: 18s; animation-delay: 4s; }
        .bg-animation div:nth-child(4) { top: 80%; left: 20%; width: 150px; height: 150px; animation-duration: 22s; animation-delay: 1s; }
        .bg-animation div:nth-child(5) { top: 20%; left: 60%; width: 100px; height: 100px; animation-duration: 28s; animation-delay: 3s; }
        .bg-animation div:nth-child(6) { top: 50%; left: 35%; width: 220px; height: 220px; animation-duration: 30s; animation-delay: 5s; }
        .bg-animation div:nth-child(7) { top: 15%; left: 45%; width: 60px; height: 60px; animation-duration: 15s; animation-delay: 6s; }
        .bg-animation div:nth-child(8) { top: 85%; left: 55%; width: 110px; height: 110px; animation-duration: 26s; animation-delay: 7s; }
        .bg-animation div:nth-child(9) { top: 30%; left: 15%; width: 70px; height: 70px; animation-duration: 32s; animation-delay: 8s; }
        .bg-animation div:nth-child(10) { top: 60%; left: 70%; width: 130px; height: 130px; animation-duration: 24s; animation-delay: 4.5s; }

        /* ----------------------------------------------
           NAVBAR PREMIUM
        ---------------------------------------------- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 20, 35, 0.98);
            backdrop-filter: blur(25px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(0, 210, 255, 0.25);
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            padding: 0.7rem 2rem;
            background: rgba(8, 15, 28, 0.98);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 900;
            background: linear-gradient(145deg, #00d2ff, #a855f7, #7c3aed, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .logo i {
            background: none;
            color: #00d2ff;
            margin-right: 5px;
        }

        .logo:hover {
            transform: scale(1.02);
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.3));
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: #cbd5e1;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(145deg, #00d2ff, #a855f7);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .nav-link:hover::before,
        .nav-link.active::before {
            width: 70%;
        }

        .nav-link:hover,
        .nav-link.active {
            background: linear-gradient(145deg, #00d2ff15, #a855f715);
            color: white;
        }

        .btn-logout {
            background: linear-gradient(145deg, #f43f5e, #e11d48);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3);
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(244, 63, 94, 0.5);
        }

        /* ----------------------------------------------
           MAIN CONTAINER
        ---------------------------------------------- */
        .main-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 110px 24px 50px;
            position: relative;
            z-index: 1;
        }

        /* ----------------------------------------------
           PROFILE CARD
        ---------------------------------------------- */
        .profile-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 48px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 210, 255, 0.2);
            animation: fadeInUp 0.6s ease;
            transition: all 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 210, 255, 0.5);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #00d2ff, #3a7bd5, #a855f7);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            font-size: 3.5rem;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .profile-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.4);
        }

        .profile-card h2 {
            color: #1e293b;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
        }

        .profile-card p {
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 30px;
        }

        .profile-stat {
            text-align: center;
        }

        .profile-stat-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #00d2ff;
        }

        .profile-stat-label {
            font-size: 0.7rem;
            color: #64748b;
        }

        .order-detail {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .order-detail:last-child {
            border-bottom: none;
        }

        .order-detail span {
            color: #64748b;
            font-weight: 500;
        }

        .order-detail strong {
            color: #1e293b;
        }

        .btn {
            width: 100%;
            background: linear-gradient(145deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.4);
        }

        /* ----------------------------------------------
           EDIT MODAL
        ---------------------------------------------- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e2e8f0;
        }

        .modal-header h3 {
            color: #1e293b;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.3s;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .close-modal:hover {
            color: #ef4444;
            background: #fee2e2;
            transform: rotate(90deg);
        }

        /* ----------------------------------------------
           RESPONSIVE DESIGN
        ---------------------------------------------- */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
                padding: 1rem;
            }
            .nav-links {
                justify-content: center;
            }
            .main-container {
                padding: 130px 16px 40px;
            }
            .profile-card {
                padding: 1.5rem;
            }
            .profile-avatar {
                width: 90px;
                height: 90px;
                font-size: 2.5rem;
            }
            .profile-card h2 {
                font-size: 1.4rem;
            }
            .profile-stats {
                gap: 1rem;
            }
            .profile-stat-number {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .profile-stats {
                flex-direction: column;
                gap: 0.5rem;
            }
            .order-detail {
                flex-direction: column;
                gap: 0.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
    </div>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-bolt"></i> Muzz Shop</div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
            <a href="products.html" class="nav-link">🛍️ Products</a>
            <a href="contact.html" class="nav-link">📞 Contact</a>
            <a href="profile.html" class="nav-link active">👤 Profile</a>
            <button class="btn-logout" onclick="logout()">🚪 Logout</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="profile-card">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <h2 id="profileName">-</h2>
            <p id="profileEmail">-</p>

            <div class="profile-stats">
                <div class="profile-stat">
                    <div class="profile-stat-number" id="orderCountStat">0</div>
                    <div class="profile-stat-label">Total Pesanan</div>
                </div>
                <div class="profile-stat">
                    <div class="profile-stat-number">⭐</div>
                    <div class="profile-stat-label">Member</div>
                </div>
                <div class="profile-stat">
                    <div class="profile-stat-number">✅</div>
                    <div class="profile-stat-label">Verified</div>
                </div>
            </div>

            <div style="margin-top: 1.5rem; text-align: left;">
                <div class="order-detail">
                    <span><i class="fab fa-whatsapp"></i> WhatsApp</span>
                    <strong id="profilePhone">-</strong>
                </div>
                <div class="order-detail">
                    <span><i class="far fa-calendar-alt"></i> Member Since</span>
                    <strong id="profileSince">-</strong>
                </div>
                <div class="order-detail">
                    <span><i class="fas fa-id-card"></i> User ID</span>
                    <strong id="profileId">-</strong>
                </div>
            </div>

            <button class="btn" onclick="viewOrders()">
                <i class="fas fa-history"></i> Lihat Riwayat Pesanan
            </button>
            <button class="btn" style="margin-top: 1rem; background: linear-gradient(145deg, #10b981, #059669);" onclick="editProfile()">
                <i class="fas fa-edit"></i> Edit Profile
            </button>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-user-edit"></i> Edit Profile</h3>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 700;">Nama Lengkap</label>
                <input type="text" id="editName" style="width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:16px;">
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 700;">WhatsApp Number</label>
                <input type="tel" id="editWa" style="width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:16px;">
            </div>
            <button class="btn" onclick="saveProfile()">Simpan Perubahan</button>
        </div>
    </div>

    <script>
        let currentUser = null;

        function checkAuth() {
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'login.html';
                return null;
            }
            return currentUser;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('pendingOrder');
            window.location.href = 'index.html';
        }

        function loadProfile() {
            const user = checkAuth();
            if (!user) return;

            document.getElementById('profileName').innerHTML = user.name;
            document.getElementById('profileEmail').innerHTML = user.email;
            document.getElementById('profilePhone').innerHTML = user.wa || '-';
            document.getElementById('profileId').innerHTML = '#' + user.id;
            
            if (user.createdAt) {
                const date = new Date(user.createdAt);
                document.getElementById('profileSince').innerHTML = date.toLocaleDateString('id-ID', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
            } else {
                document.getElementById('profileSince').innerHTML = 'Baru';
            }

            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const userOrders = orders.filter(o => o.customerEmail === user.email);
            document.getElementById('orderCountStat').innerHTML = userOrders.length;
        }

        function viewOrders() {
            window.location.href = 'orders.html';
        }

        function editProfile() {
            const modal = document.getElementById('editModal');
            const user = checkAuth();
            if (!user) return;

            document.getElementById('editName').value = user.name;
            document.getElementById('editWa').value = user.wa || '';
            modal.classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function saveProfile() {
            const newName = document.getElementById('editName').value.trim();
            const newWa = document.getElementById('editWa').value.trim();

            if (!newName) {
                alert('Nama tidak boleh kosong!');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.email === currentUser.email);

            if (userIndex !== -1) {
                users[userIndex].name = newName;
                users[userIndex].wa = newWa || '-';
                localStorage.setItem('users', JSON.stringify(users));

                const updatedUser = { ...currentUser, name: newName, wa: newWa || '-' };
                localStorage.setItem('currentUser', JSON.stringify(updatedUser));
                currentUser = updatedUser;

                loadProfile();
                closeEditModal();
                alert('✅ Profil berhasil diupdate!');
            }
        }

        loadProfile();

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeEditModal();
            }
        }
    </script>
</body>
</html>
