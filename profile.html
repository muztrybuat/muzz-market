<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Muzz Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d2ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: #a0b3d9;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 40px;
            transition: all 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
        }

        .btn-logout {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .main-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .profile-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 3rem;
            color: white;
        }

        .profile-card h2 {
            color: #1a1a2e;
            margin-bottom: 0.3rem;
        }

        .profile-card p {
            color: #4a4a6a;
            margin-bottom: 1rem;
        }

        .order-detail {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .order-detail:last-child {
            border-bottom: none;
        }

        .order-detail span {
            color: #4a4a6a;
        }

        .order-detail strong {
            color: #1a1a2e;
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .profile-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-bolt"></i> Muzz Shop</div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="products.html" class="nav-link">Products</a>
            <a href="contact.html" class="nav-link">Contact</a>
            <a href="profile.html" class="nav-link active">Profile</a>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="profile-card">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <h2 id="profileName">-</h2>
            <p id="profileEmail">-</p>
            
            <div style="margin-top: 1.5rem; text-align: left;">
                <div class="order-detail">
                    <span><i class="fab fa-whatsapp"></i> WhatsApp</span>
                    <strong id="profilePhone">-</strong>
                </div>
                <div class="order-detail">
                    <span><i class="far fa-calendar-alt"></i> Member Since</span>
                    <strong id="profileSince">-</strong>
                </div>
            </div>
            
            <button class="btn" onclick="viewOrders()">
                <i class="fas fa-history"></i> Lihat Riwayat Pesanan
            </button>
        </div>
    </div>

    <script>
        function checkAuth() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'login.html';
            }
            return currentUser;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        function viewOrders() {
            window.location.href = 'orders.html';
        }

        function loadProfile() {
            const user = checkAuth();
            if (!user) return;
            
            document.getElementById('profileName').innerHTML = user.name;
            document.getElementById('profileEmail').innerHTML = user.email;
            document.getElementById('profilePhone').innerHTML = user.wa || '-';
            
            if (user.createdAt) {
                const date = new Date(user.createdAt);
                document.getElementById('profileSince').innerHTML = date.toLocaleDateString('id-ID');
            } else {
                document.getElementById('profileSince').innerHTML = 'New Member';
            }
        }

        loadProfile();
    </script>
</body>
</html>
