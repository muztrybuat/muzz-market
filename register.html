<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Muzz Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
        }

        .register-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d2ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        h2 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #4a4a6a;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #1a1a2e;
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #00d2ff;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1px solid #ddd;
            border-radius: 14px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d2ff;
            box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.2);
        }

        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .auth-link {
            text-align: center;
            margin-top: 1.2rem;
            color: #4a4a6a;
            font-size: 0.9rem;
        }

        .auth-link a {
            color: #00d2ff;
            text-decoration: none;
            font-weight: 600;
        }

        .error-msg, .success-msg {
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }

        .error-msg {
            background: #fee2e2;
            color: #dc2626;
        }

        .success-msg {
            background: #dcfce7;
            color: #16a34a;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="logo">
                <i class="fas fa-bolt"></i> Muzz Shop
            </div>
            <h2>Create Account</h2>
            <p class="subtitle">Join us and start ordering</p>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>

            <div class="form-group">
                <label>Full Name</label>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regName" placeholder="Your full name">
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="your@email.com">
                </div>
            </div>

            <div class="form-group">
                <label>WhatsApp Number</label>
                <div class="input-group">
                    <i class="fab fa-whatsapp"></i>
                    <input type="tel" id="regWa" placeholder="628123456789">
                </div>
            </div>

            <div class="row-2col">
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="password">
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-group">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="regConfirmPassword" placeholder="confirm">
                    </div>
                </div>
            </div>

            <button class="btn" onclick="register()">Register</button>

            <div class="auth-link">
                Already have account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script>
        function register() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const wa = document.getElementById('regWa').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!name || !email || !password) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = 'All fields are required!';
                return;
            }
            
            if (password !== confirmPassword) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = 'Passwords do not match!';
                return;
            }
            
            if (password.length < 4) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = 'Password must be at least 4 characters!';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if (users.find(u => u.email === email)) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = 'Email already registered!';
                return;
            }
            
            const newUser = {
                id: Date.now(),
                name: name,
                email: email,
                wa: wa || '-',
                password: password,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            successDiv.style.display = 'block';
            successDiv.innerHTML = 'Registration successful! Redirecting to login...';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        }
    </script>
</body>
</html>
