<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Register - Muzz Shop | Daftar Akun Baru</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ================================================================================== */
        /* MUZZ SHOP - REGISTER PAGE - FULL STYLESHEET                                      */
        /* VERSION 3.0.0 - ULTIMATE EDITION                                                */
        /* ================================================================================== */
        
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #0a0a1a 0%, #1a1a3a 50%, #0d0d2b 100%);
            min-height: 100vh;
            line-height: 1.5;
            color: #e2e8f0;
            overflow-x: hidden;
            position: relative;
        }

        /* ----------------------------------------------
           CUSTOM SCROLLBAR PREMIUM
        ---------------------------------------------- */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(145deg, #00d2ff, #a855f7, #7c3aed);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(145deg, #00b4d8, #9b30ff, #6d28d9);
        }

        ::-webkit-scrollbar-corner {
            background: #1a1a2e;
        }

        /* ----------------------------------------------
           SELECTION STYLE
        ---------------------------------------------- */
        ::selection {
            background: linear-gradient(145deg, #00d2ff, #a855f7);
            color: white;
        }

        ::-moz-selection {
            background: linear-gradient(145deg, #00d2ff, #a855f7);
            color: white;
        }

        /* ----------------------------------------------
           ANIMATIONS KEYFRAMES
        ---------------------------------------------- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        @keyframes floatSlow {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
            }
            25% {
                transform: translateY(-30px) translateX(20px);
            }
            50% {
                transform: translateY(20px) translateX(-20px);
            }
            75% {
                transform: translateY(-10px) translateX(10px);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes borderGlow {
            0%, 100% {
                border-color: rgba(0, 210, 255, 0.3);
            }
            50% {
                border-color: rgba(0, 210, 255, 0.8);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        /* ----------------------------------------------
           ANIMATED BACKGROUND PARTICLES
        ---------------------------------------------- */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-animation div {
            position: absolute;
            display: block;
            background: linear-gradient(145deg, rgba(0, 210, 255, 0.08), rgba(168, 85, 247, 0.08));
            border-radius: 50%;
            animation: floatSlow 25s infinite ease-in-out;
        }

        .bg-animation div:nth-child(1) { top: 10%; left: 10%; width: 120px; height: 120px; animation-duration: 20s; }
        .bg-animation div:nth-child(2) { top: 70%; left: 80%; width: 180px; height: 180px; animation-duration: 25s; animation-delay: 2s; }
        .bg-animation div:nth-child(3) { top: 40%; left: 85%; width: 80px; height: 80px; animation-duration: 18s; animation-delay: 4s; }
        .bg-animation div:nth-child(4) { top: 80%; left: 20%; width: 150px; height: 150px; animation-duration: 22s; animation-delay: 1s; }
        .bg-animation div:nth-child(5) { top: 20%; left: 60%; width: 100px; height: 100px; animation-duration: 28s; animation-delay: 3s; }
        .bg-animation div:nth-child(6) { top: 50%; left: 35%; width: 220px; height: 220px; animation-duration: 30s; animation-delay: 5s; }
        .bg-animation div:nth-child(7) { top: 15%; left: 45%; width: 60px; height: 60px; animation-duration: 15s; animation-delay: 6s; }
        .bg-animation div:nth-child(8) { top: 85%; left: 55%; width: 110px; height: 110px; animation-duration: 26s; animation-delay: 7s; }

        /* ----------------------------------------------
           NAVBAR PREMIUM
        ---------------------------------------------- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 20, 35, 0.98);
            backdrop-filter: blur(25px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(0, 210, 255, 0.25);
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            padding: 0.7rem 2rem;
            background: rgba(8, 15, 28, 0.98);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 900;
            background: linear-gradient(145deg, #00d2ff, #a855f7, #7c3aed, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .logo i {
            background: none;
            color: #00d2ff;
            margin-right: 5px;
        }

        .logo:hover {
            transform: scale(1.02);
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.3));
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: #cbd5e1;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(145deg, #00d2ff, #a855f7);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .nav-link:hover::before {
            width: 70%;
        }

        .nav-link:hover {
            background: linear-gradient(145deg, #00d2ff15, #a855f715);
            color: white;
        }

        /* ----------------------------------------------
           REGISTER CONTAINER
        ---------------------------------------------- */
        .register-container {
            width: 100%;
            max-width: 580px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 48px;
            padding: 2.8rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(0, 210, 255, 0.2);
            transition: all 0.3s ease;
        }

        .register-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 210, 255, 0.5);
        }

        .logo-center {
            text-align: center;
            margin-bottom: 1rem;
        }

        .logo-center .logo-text {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(145deg, #00d2ff, #a855f7, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        /* ----------------------------------------------
           FORM STYLES
        ---------------------------------------------- */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: #1e293b;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #00d2ff;
            font-size: 1rem;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafc;
            color: #1e293b;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d2ff;
            box-shadow: 0 0 0 4px rgba(0, 210, 255, 0.15);
        }

        .input-group input::placeholder {
            color: #94a3b8;
        }

        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* ----------------------------------------------
           TERMS CHECKBOX
        ---------------------------------------------- */
        .terms-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }

        .terms-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00d2ff;
        }

        .terms-group label {
            color: #64748b;
            font-size: 0.8rem;
        }

        .terms-group a {
            color: #00d2ff;
            text-decoration: none;
            font-weight: 600;
        }

        /* ----------------------------------------------
           BUTTON
        ---------------------------------------------- */
        .btn {
            width: 100%;
            background: linear-gradient(145deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.4);
        }

        /* ----------------------------------------------
           AUTH LINK
        ---------------------------------------------- */
        .auth-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
            font-size: 0.9rem;
        }

        .auth-link a {
            color: #00d2ff;
            text-decoration: none;
            font-weight: 700;
        }

        /* ----------------------------------------------
           MESSAGES
        ---------------------------------------------- */
        .error-msg, .success-msg {
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .error-msg {
            background: linear-gradient(145deg, #fee2e2, #fecaca);
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .success-msg {
            background: linear-gradient(145deg, #dcfce7, #bbf7d0);
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        /* ----------------------------------------------
           DIVIDER
        ---------------------------------------------- */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        /* ----------------------------------------------
           SOCIAL BUTTONS
        ---------------------------------------------- */
        .social-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-btn {
            flex: 1;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #64748b;
            font-weight: 500;
        }

        .social-btn:hover {
            background: #f1f5f9;
            transform: translateY(-2px);
        }

        /* ----------------------------------------------
           RESPONSIVE
        ---------------------------------------------- */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
                padding: 1rem;
            }
            .nav-links {
                justify-content: center;
            }
            .register-card {
                padding: 1.8rem;
                margin: 0 1rem;
            }
            h2 {
                font-size: 1.5rem;
            }
            .row-2col {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 1.5rem;
            }
            .logo-center .logo-text {
                font-size: 1.5rem;
            }
            h2 {
                font-size: 1.3rem;
            }
            .social-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
    </div>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-bolt"></i> Muzz Shop</div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="login.html" class="nav-link">🔐 Login</a>
            <a href="register.html" class="nav-link active">📝 Register</a>
        </div>
    </nav>

    <div class="register-container">
        <div class="register-card">
            <div class="logo-center">
                <div class="logo-text"><i class="fas fa-bolt"></i> Muzz Shop</div>
            </div>
            <h2>Create Account 🚀</h2>
            <p class="subtitle">Join us and start ordering</p>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>

            <div class="form-group">
                <label>👤 Full Name</label>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regName" placeholder="Your full name">
                </div>
            </div>

            <div class="form-group">
                <label>📧 Email Address</label>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="your@email.com">
                </div>
            </div>

            <div class="form-group">
                <label>📱 WhatsApp Number</label>
                <div class="input-group">
                    <i class="fab fa-whatsapp"></i>
                    <input type="tel" id="regWa" placeholder="628123456789">
                </div>
            </div>

            <div class="row-2col">
                <div class="form-group">
                    <label>🔒 Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="password">
                    </div>
                </div>
                <div class="form-group">
                    <label>✅ Confirm Password</label>
                    <div class="input-group">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="regConfirmPassword" placeholder="confirm password">
                    </div>
                </div>
            </div>

            <div class="terms-group">
                <input type="checkbox" id="termsCheckbox">
                <label for="termsCheckbox">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
            </div>

            <button class="btn" onclick="register()">
                <i class="fas fa-user-plus"></i> Create Account
            </button>

            <div class="divider">or</div>

            <div class="social-buttons">
                <button class="social-btn" onclick="alert('Google login coming soon')">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="social-btn" onclick="alert('Facebook login coming soon')">
                    <i class="fab fa-facebook"></i> Facebook
                </button>
            </div>

            <div class="auth-link">
                Already have account? <a href="login.html">🔐 Login here</a>
            </div>
        </div>
    </div>

    <script>
        function register() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const wa = document.getElementById('regWa').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const termsChecked = document.getElementById('termsCheckbox').checked;
            
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Validasi name
            if (!name) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Nama lengkap harus diisi!';
                return;
            }
            
            if (name.length < 3) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Nama minimal 3 karakter!';
                return;
            }
            
            // Validasi email
            if (!email) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Email harus diisi!';
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Format email tidak valid!';
                return;
            }
            
            // Validasi password
            if (!password) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Password harus diisi!';
                return;
            }
            
            if (password.length < 4) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Password minimal 4 karakter!';
                return;
            }
            
            if (password !== confirmPassword) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Password tidak cocok!';
                return;
            }
            
            // Validasi terms
            if (!termsChecked) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Anda harus menyetujui Terms of Service!';
                return;
            }
            
            // Cek email sudah terdaftar
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => u.email === email)) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ Email sudah terdaftar! Silakan login.';
                return;
            }
            
            // Buat user baru
            const newUser = {
                id: Date.now(),
                name: name,
                email: email,
                wa: wa || '-',
                password: password,
                createdAt: new Date().toISOString(),
                avatar: null,
                verified: false
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            successDiv.style.display = 'block';
            successDiv.innerHTML = '✅ Registrasi berhasil! Redirecting to login...';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }
        
        // Add input validation on the fly
        document.getElementById('regPassword').addEventListener('input', function() {
            const strength = this.value.length;
            const hint = document.getElementById('passwordStrength');
            if (strength === 0) return;
            if (strength < 4) {
                this.style.borderColor = '#ef4444';
            } else if (strength < 8) {
                this.style.borderColor = '#eab308';
            } else {
                this.style.borderColor = '#22c55e';
            }
        });
    </script>
</body>
</html>
